spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.security=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

spring.jpa.properties.hibernate.dialect.storage_engine=innodb

spring.jpa.properties.hibernate.hbm2ddl.defer_foreign_key_creation=true
spring.jpa.properties.hibernate.hbm2ddl.order_inserts=true
spring.jpa.properties.hibernate.hbm2ddl.order_updates=true

storage.base-path=C:/imagenes
storage.public-base-url=http://localhost:8080/uploads